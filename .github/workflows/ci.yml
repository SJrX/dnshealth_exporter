name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Integration tests
        run: go test -tags=integration -count=1 -v ./...

  demo-smoke:
    # End-to-end regression check that catches a class of failures
    # the Go test suite cannot: Compose YAML validity, CoreDNS Corefile
    # / zone-file parse errors at startup, dashboard JSON structural
    # correctness (Grafana provisioning rejects bad JSON at boot), and
    # the exporter wired against real DNS over a real network stack.
    # See issue #15 for the rationale and demo/smoke.sh for what it
    # asserts.
    needs: test
    runs-on: ubuntu-latest
    # Smoke itself typically takes ~2.5 min (build + readiness wait +
    # assertions + teardown). 10 min cap gives generous slack while
    # still failing fast if a container hangs.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      # Go is needed for smoke.sh Step 6, the live dashboard-PromQL
      # predicate evaluation (issue #46) — it runs the promql_live test
      # against the running Prometheus. Without a toolchain that step
      # warns and skips, silently losing the coverage in CI, so install
      # Go explicitly here. docker + docker compose are preinstalled on
      # ubuntu-latest.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      # smoke.sh handles bring-up, teardown, and dumps the last 50 lines
      # of compose logs on assertion failure for debuggability from the
      # Actions log.
      - name: Run demo smoke test
        run: cd demo && ./smoke.sh
