zones:
  - example.com
  - example.org

# Probe cycle interval (default: 60s)
# probe_interval: 60s

# How long to cache delegation walk results for non-target
# infrastructure (root, TLD, parent servers). Default: 30m.
# Authoritative nameserver queries are never cached.
# delegation_cache_ttl: 30m

# Timeout for individual DNS queries (default: 5s)
# query_timeout: 5s

# Overall deadline per zone — outstanding queries cancelled
# when this expires (default: 30s)
# zone_deadline: 30s

# Override addresses for specific nameserver IPs (optional)
# address_overrides:
#   "10.0.0.5": "10.0.0.5:5353"
