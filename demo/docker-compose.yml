# dnshealth_exporter demo deployment.
#
# Bring up:    docker compose up -d --build
# Stop/clean:  docker compose down -v
# Override ports: copy .env.example to .env and edit.
#
# CoreDNS containers are NOT exposed on the host — they only need to be
# reachable from the exporter container over the internal demo network.
# This is what lets the demo run on hosts where port 53 is taken
# (systemd-resolved, etc.).

networks:
  demo:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

services:
  # The fake root + fake `demo.` TLD. Static IP 172.31.0.10 — must
  # match the glue records in coredns/root/zones/*.zone.
  coredns-root:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/root/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/root/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.10
        aliases:
          - ns1.root.
    restart: unless-stopped

  # Authoritative for healthy.demo. Static IP 172.31.0.11 — matches
  # ns1.healthy.demo. / ns2.healthy.demo. glue in demo.zone (the
  # healthy zone uses in-bailiwick NSs since Phase 8 / T061). The
  # static IP is what makes the parent's glue records valid; no Docker
  # DNS aliases are required.
  coredns-healthy:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/healthy/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/healthy/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.11
    restart: unless-stopped

  # Primary A for soa-serial-mismatch.demo. (SOA serial 100). Static
  # IP 172.31.0.12 matches ns1.soa-serial-mismatch.demo. glue.
  coredns-soa-serial-mismatch-a:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/soa-serial-mismatch-a/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/soa-serial-mismatch-a/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.12
        aliases:
          - ns1.soa-serial-mismatch.demo.
    restart: unless-stopped

  # Primary B for soa-serial-mismatch.demo. (SOA serial 101). Static
  # IP 172.31.0.13 matches ns2.soa-serial-mismatch.demo. glue.
  coredns-soa-serial-mismatch-b:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/soa-serial-mismatch-b/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/soa-serial-mismatch-b/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.13
        aliases:
          - ns2.soa-serial-mismatch.demo.
    restart: unless-stopped

  # Lame nameserver for lame-nameserver.demo. — parent delegates here
  # but this container does not authoritatively serve the zone. It's
  # a CoreDNS forwarder; the SOA query fails.
  coredns-lame-nameserver:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/lame-nameserver/Corefile:/etc/coredns/Corefile:ro
    networks:
      demo:
        ipv4_address: 172.31.0.14
        aliases:
          - ns1.lame-nameserver.demo.
    depends_on:
      - coredns-root
    restart: unless-stopped

  # Authoritative for ns-mismatch.demo. — this server returns NS
  # records that DON'T match what the parent advertised.
  coredns-ns-mismatch:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.15
        aliases:
          - ns1.ns-mismatch.demo.
    restart: unless-stopped

  # Authoritative for v6-only.demo. — demonstrates the spec 006 /
  # #23 fix: a zone whose NSes have only AAAA records. The container
  # binds to v4 (172.31.0.16) but the delegation and the auth zone
  # both advertise AAAA only. The exporter's address_overrides
  # below map 2001:db8::16 back to this container so the demo runs
  # on an IPv4-only Docker bridge.
  coredns-v6-only:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/v6-only/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/v6-only/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.16
        aliases:
          - ns1.v6-only.demo.
          - ns2.v6-only.demo.
    restart: unless-stopped

  # Authoritative for dup-glue.demo. The interesting bit is in the
  # root zone's referral (demo/coredns/root/zones/demo.zone), which
  # advertises the same A glue record for ns1.dup-glue.demo. TWICE.
  # CoreDNS serves duplicate RRs from its zone file verbatim, so the
  # exporter sees the duplicate on the wire — this is the trigger
  # for issue #26 (pre-fix: per-server query counter inflated).
  # Dedicated container at a unique IP so the counter assertion can
  # be isolated from other zones' traffic.
  coredns-dup-glue:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/dup-glue/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/dup-glue/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.17
        aliases:
          - ns1.dup-glue.demo.
    restart: unless-stopped

  # Authoritative for ns-names-mismatch.demo. Parent's root referral
  # advertises this zone via ns-parent-a / ns-parent-b (both glued
  # to 172.31.0.18 = this container). The zone file served here
  # advertises ns-self-c / ns-self-d as its own NS RR set. Counts
  # match (2 == 2), names differ entirely — the case the old
  # count-only NS-status row D missed (#36).
  coredns-ns-names-mismatch:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-names-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-names-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.18
        aliases:
          - ns-parent-a.ns-names-mismatch.demo.
          - ns-parent-b.ns-names-mismatch.demo.
    restart: unless-stopped

  exporter:
    build:
      context: ..
      dockerfile: demo/Dockerfile.exporter
    command:
      - --config.file=/etc/dnshealth/dnshealth.yml
      - --web.listen-address=:9266
    volumes:
      - ./exporter/dnshealth.yml:/etc/dnshealth/dnshealth.yml:ro
    ports:
      - "${EXPORTER_PORT:-9053}:9266"
    networks:
      - demo
    depends_on:
      - coredns-root
      - coredns-healthy
      - coredns-soa-serial-mismatch-a
      - coredns-soa-serial-mismatch-b
      - coredns-lame-nameserver
      - coredns-ns-mismatch
      - coredns-v6-only
      - coredns-dup-glue
      - coredns-ns-names-mismatch
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=1h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - demo
    depends_on:
      - exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
      GF_USERS_DEFAULT_THEME: "light"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - demo
    depends_on:
      - prometheus
    restart: unless-stopped
