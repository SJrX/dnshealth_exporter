# Demo exporter configuration. The contract reference for this file
# lives at specs/004-demo-deployment/contracts/exporter-config.yml.
#
# The demo runs entirely offline: `root_servers` points the delegation
# walk at the in-stack fake root container instead of the public root.

zones:
  # Parent / NS / SOA / glue scenarios — the signal is in those panels;
  # each now carries the green mail baseline so the Mail section is quiet.
  - healthy.demo.
  - soa-serial-mismatch.demo.
  - missing-glue.demo.
  - lame-nameserver.demo.
  - ns-mismatch.demo.
  - v6-only.demo.
  - dup-glue.demo.
  - ns-names-mismatch.demo.
  - ns-ip-mismatch.demo.
  - hidden-master.demo.
  # MX scenarios (spec 008).
  - mx-healthy.demo.
  - mx-broken.demo.
  - mx-null.demo.
  - mx-null-conflict.demo.
  # Mail-auth scenarios — each isolates one MX/SPF/DMARC signal and is
  # named for it; everything else is the green baseline (specs 009/010).
  - email-healthy.demo.
  - email-nomail.demo.
  - email-no-auth.demo.
  - dmarc-absent.demo.
  - dmarc-monitoring.demo.
  - dmarc-malformed.demo.
  - spf-permissive.demo.
  - spf-multiple.demo.
  - spf-toomanylookups.demo.
  - spf-incomplete.demo.

# Tighter than the 60s production default so iteration sees changes
# within ~20 seconds.
probe_interval: 15s

# Local-network queries are fast.
query_timeout: 2s

# Match the probe interval — no point letting one cycle's deadline
# overrun the next cycle's start.
zone_deadline: 15s

# Offline root override. Resolves to the coredns-root container by
# Docker DNS inside the demo network.
root_servers:
  - coredns-root:53

# IPv6 address overrides — spec 006. The demo's Docker bridge is
# IPv4-only by design, but the zones advertise AAAA glue at
# 2001:db8:: addresses (RFC 3849 documentation prefix). These
# overrides route every v6 lookup back to the corresponding v4
# container endpoint via Docker DNS. The exporter sees v6 in its
# data model and metric labels (FR-014); the actual queries
# transit v4.
#
# Mappings:
#   2001:db8::11 → coredns-healthy (also serves both NS aliases of
#                  healthy.demo.)
#   2001:db8::16 → coredns-v6-only (the IPv6-only demo zone)
address_overrides:
  "2001:db8::11": "coredns-healthy:53"
  "2001:db8::16": "coredns-v6-only:53"
