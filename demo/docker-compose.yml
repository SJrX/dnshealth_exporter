# dnshealth_exporter demo deployment.
#
# Bring up:    docker compose up -d --build
# Stop/clean:  docker compose down -v
# Override ports: copy .env.example to .env and edit.
#
# CoreDNS containers are NOT exposed on the host — they only need to be
# reachable from the exporter container over the internal demo network.
# This is what lets the demo run on hosts where port 53 is taken
# (systemd-resolved, etc.).

networks:
  demo:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

services:
  # The fake root + fake `demo.` TLD. Static IP 172.31.0.10 — must
  # match the glue records in coredns/root/zones/*.zone.
  coredns-root:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/root/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/root/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.10
        aliases:
          - ns1.root.
    restart: unless-stopped

  # Authoritative for healthy.demo. Static IP 172.31.0.11 — matches
  # ns1.healthy.demo. / ns2.healthy.demo. glue in demo.zone (the
  # healthy zone uses in-bailiwick NSs since Phase 8 / T061). The
  # static IP is what makes the parent's glue records valid; no Docker
  # DNS aliases are required.
  coredns-healthy:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/healthy/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/healthy/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.11
    restart: unless-stopped

  # Primary A for soa-serial-mismatch.demo. (SOA serial 100). Static
  # IP 172.31.0.12 matches ns1.soa-serial-mismatch.demo. glue.
  coredns-soa-serial-mismatch-a:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/soa-serial-mismatch-a/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/soa-serial-mismatch-a/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.12
        aliases:
          - ns1.soa-serial-mismatch.demo.
    restart: unless-stopped

  # Primary B for soa-serial-mismatch.demo. (SOA serial 101). Static
  # IP 172.31.0.13 matches ns2.soa-serial-mismatch.demo. glue.
  coredns-soa-serial-mismatch-b:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/soa-serial-mismatch-b/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/soa-serial-mismatch-b/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.13
        aliases:
          - ns2.soa-serial-mismatch.demo.
    restart: unless-stopped

  # Lame nameserver for lame-nameserver.demo. — parent delegates here
  # but this container does not authoritatively serve the zone. It's
  # a CoreDNS forwarder; the SOA query fails.
  coredns-lame-nameserver:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/lame-nameserver/Corefile:/etc/coredns/Corefile:ro
    networks:
      demo:
        ipv4_address: 172.31.0.14
        aliases:
          - ns1.lame-nameserver.demo.
    depends_on:
      - coredns-root
    restart: unless-stopped

  # Authoritative for ns-mismatch.demo. — this server returns NS
  # records that DON'T match what the parent advertised.
  coredns-ns-mismatch:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.15
        aliases:
          - ns1.ns-mismatch.demo.
    restart: unless-stopped

  # Authoritative for v6-only.demo. — demonstrates the spec 006 /
  # #23 fix: a zone whose NSes have only AAAA records. The container
  # binds to v4 (172.31.0.16) but the delegation and the auth zone
  # both advertise AAAA only. The exporter's address_overrides
  # below map 2001:db8::16 back to this container so the demo runs
  # on an IPv4-only Docker bridge.
  coredns-v6-only:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/v6-only/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/v6-only/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.16
        aliases:
          - ns1.v6-only.demo.
          - ns2.v6-only.demo.
    restart: unless-stopped

  # Authoritative for dup-glue.demo. The interesting bit is in the
  # root zone's referral (demo/coredns/root/zones/demo.zone), which
  # advertises the same A glue record for ns1.dup-glue.demo. TWICE.
  # CoreDNS serves duplicate RRs from its zone file verbatim, so the
  # exporter sees the duplicate on the wire — this is the trigger
  # for issue #26 (pre-fix: per-server query counter inflated).
  # Dedicated container at a unique IP so the counter assertion can
  # be isolated from other zones' traffic.
  coredns-dup-glue:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/dup-glue/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/dup-glue/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.17
        aliases:
          - ns1.dup-glue.demo.
    restart: unless-stopped

  # Authoritative for ns-names-mismatch.demo. Parent's root referral
  # advertises this zone via ns-parent-a / ns-parent-b (both glued
  # to 172.31.0.18 = this container). The zone file served here
  # advertises ns-self-c / ns-self-d as its own NS RR set. Counts
  # match (2 == 2), names differ entirely — the case the old
  # count-only NS-status row D missed (#36).
  coredns-ns-names-mismatch:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-names-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-names-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.18
        aliases:
          - ns-parent-a.ns-names-mismatch.demo.
          - ns-parent-b.ns-names-mismatch.demo.
    restart: unless-stopped

  # Authoritative for ns-ip-mismatch.demo. The parent's root referral
  # glues ns1 / ns2 to 172.31.0.19 (this container); the zone file
  # served here answers the A of those SAME hostnames as 172.31.0.20.
  # NS names agree parent-vs-self; only the IP behind them disagrees —
  # the case the new "Parent glue agrees with auth-reported addresses"
  # NS-status row catches (#37). The exporter reaches this server via
  # the parent's .19 glue to read the zone, then re-resolves the NS
  # hostnames to .20 (the auth's own answer) and probes THAT — so .20
  # must also serve the zone, otherwise every downstream probe (SOA,
  # recursion, classification) times out and the whole probe cycle
  # blows its deadline. coredns-ns-ip-mismatch-b below is that second
  # endpoint; both mount the SAME zone files.
  coredns-ns-ip-mismatch:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-ip-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-ip-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.19
        aliases:
          - ns1.ns-ip-mismatch.demo.
          - ns2.ns-ip-mismatch.demo.
    restart: unless-stopped

  # Second endpoint for ns-ip-mismatch.demo. at 172.31.0.20 — the
  # address the auth's own A records claim for ns1 / ns2 (vs the .19
  # the parent glues). Serves the identical zone so the exporter's
  # re-resolved probes to .20 succeed; the parent-glue-vs-auth IP
  # divergence is what #37's row detects, NOT an unreachable server.
  coredns-ns-ip-mismatch-b:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/ns-ip-mismatch/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/ns-ip-mismatch/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.20
    restart: unless-stopped

  # Authoritative for hidden-master.demo. — exercises the self-only
  # stealth NS detection from spec 007. The auth zone advertises 3
  # NSes (ns1, ns2, hidden-primary); the root referral lists only
  # the first two. The third surfaces as classification="self-only"
  # with stealth_reachable=0 (no A record anywhere — modeling a
  # leaked listing pattern, not a working hidden master).
  coredns-hidden-master:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/hidden-master/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/hidden-master/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.21
        aliases:
          - ns1.hidden-master.demo.
          - ns2.hidden-master.demo.
    restart: unless-stopped

  # Authoritative for mx-null.demo. — spec 008 US2 RFC 7505 Null MX
  # demo. Zone publishes a single MX RR `0 .` declaring no email.
  # Exporter recognizes this; dashboard MX-presence row stays PASS.
  coredns-mx-null:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/mx-null/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/mx-null/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.23
        aliases:
          - ns1.mx-null.demo.
    restart: unless-stopped

  # Authoritative for mx-null-conflict.demo. — RFC 7505 violation demo
  # (issue #46). Zone publishes BOTH `0 .` and a real MX, so the
  # dashboard MX row E ("no Null-MX/real-MX conflict") FAILs for it.
  # Gives the live-PromQL smoke check a fixture for row E's FAIL path
  # (spec 008 bug #4 shipped because no zone exercised it).
  coredns-mx-null-conflict:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/mx-null-conflict/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/mx-null-conflict/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.26
        aliases:
          - ns1.mx-null-conflict.demo.
    restart: unless-stopped

  # Authoritative for mx-healthy.demo. — spec 008 MX-prober happy
  # path. Two MXes at priorities 10 + 20, both targets in-zone and
  # resolvable, neither CNAMEd.
  coredns-mx-healthy:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/mx-healthy/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/mx-healthy/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.22
        aliases:
          - ns1.mx-healthy.demo.
    restart: unless-stopped

  # Authoritative for mx-broken.demo. — spec 008 MX-prober failure
  # paths. Two MXes: priority 10 target is a CNAME (RFC 2181 §10.3
  # violation), priority 20 target is unresolvable (no A anywhere).
  coredns-mx-broken:
    image: coredns/coredns:latest
    command: ["-conf", "/etc/coredns/Corefile"]
    volumes:
      - ./coredns/mx-broken/Corefile:/etc/coredns/Corefile:ro
      - ./coredns/mx-broken/zones:/zones:ro
    networks:
      demo:
        ipv4_address: 172.31.0.24
        aliases:
          - ns1.mx-broken.demo.
    restart: unless-stopped

  exporter:
    build:
      context: ..
      dockerfile: demo/Dockerfile.exporter
    command:
      - --config.file=/etc/dnshealth/dnshealth.yml
      - --web.listen-address=:9266
    volumes:
      - ./exporter/dnshealth.yml:/etc/dnshealth/dnshealth.yml:ro
    ports:
      - "${EXPORTER_PORT:-9053}:9266"
    networks:
      - demo
    depends_on:
      - coredns-root
      - coredns-healthy
      - coredns-soa-serial-mismatch-a
      - coredns-soa-serial-mismatch-b
      - coredns-lame-nameserver
      - coredns-ns-mismatch
      - coredns-v6-only
      - coredns-dup-glue
      - coredns-ns-names-mismatch
      - coredns-ns-ip-mismatch
      - coredns-ns-ip-mismatch-b
      - coredns-hidden-master
      - coredns-mx-healthy
      - coredns-mx-broken
      - coredns-mx-null
      - coredns-mx-null-conflict
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=1h
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - demo
    depends_on:
      - exporter
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Editor"
      GF_USERS_DEFAULT_THEME: "light"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - demo
    depends_on:
      - prometheus
    restart: unless-stopped
